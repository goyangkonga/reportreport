<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>간트 차트 생성기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f0f0;padding:16px;font-size:13px;color:#111}
h1{font-size:17px;font-weight:700;margin-bottom:14px}
.panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:10px}
.panel-title{font-size:12px;font-weight:700;color:#444;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:#666}
input[type=date],input[type=number]{height:30px;font-size:12px;padding:0 8px;border:1px solid #ccc;border-radius:5px;background:#fff;color:#111}
input[type=number]{width:58px}
input[type=range]{width:80px;cursor:pointer;vertical-align:middle}
.sv{font-size:12px;font-weight:600;min-width:32px;display:inline-block}
.btn{height:30px;padding:0 14px;font-size:12px;border-radius:5px;border:1px solid #bbb;background:#f0f0f0;color:#111;cursor:pointer;font-weight:600;white-space:nowrap}
.btn:hover{filter:brightness(.93)}
.btn-go{background:#E8920A;border-color:#C47800;color:#fff}
.btn-ppt{background:#C84B31;border-color:#a03520;color:#fff}
.btn-undo{background:#d44;border-color:#b22;color:#fff}
.mbar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.mbtn{height:28px;padding:0 12px;font-size:11px;border-radius:5px;border:1px solid #bbb;background:#f0f0f0;color:#111;cursor:pointer;font-weight:600}
.mbtn.on{background:#E8920A;color:#fff;border-color:#C47800}
.hint{font-size:11px;color:#666;margin-bottom:8px;line-height:1.8}
.chart-wrap{overflow-x:auto;background:#fff;border:1px solid #ccc;border-radius:6px;padding:10px}
#ct{position:relative;display:inline-block}
table#gt{border-collapse:collapse;position:relative;background:#fff;user-select:none;-webkit-user-select:none}
table#gt th,table#gt td{padding:0;text-align:center;vertical-align:middle}
td.cell.sel{background:#FFE082!important}
.add-row-btn{font-size:11px;color:#1a6fc4;cursor:pointer;padding:4px 10px;border:1px dashed #1a6fc4;border-radius:4px;display:inline-block;margin-top:8px}
.add-row-btn:hover{background:#e8f0fb}
.ref-info{font-size:11px;color:#cc0000;font-weight:700;margin-left:8px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:#fff;border-radius:10px;padding:22px;width:320px;border:1px solid #ccc;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px}
.modal textarea{width:100%;height:62px;font-size:12px;padding:7px 9px;border:1px solid #ccc;border-radius:5px;resize:vertical;font-family:inherit;margin-bottom:6px}
.mhint{font-size:10px;color:#888;margin-bottom:10px}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<h1>📊 간트 차트 생성기</h1>

<div class="panel">
  <div class="panel-title">기간 설정</div>
  <div class="row">
    <div class="fg"><label>시작일</label><input type="date" id="cs" value="2025-03-26"></div>
    <div class="fg"><label>종료일</label><input type="date" id="ce" value="2025-04-30"></div>
    <button class="btn btn-go" onclick="buildChart()">차트 생성</button>
    <button class="btn btn-undo" onclick="undoLast()">↩ 화살표 삭제</button>
    <button class="btn btn-ppt" onclick="exportPPT()">📊 PPT 다운로드</button>
  </div>
</div>

<div class="panel">
  <div class="panel-title">실시간 크기 조절</div>
  <div class="row">
    <div class="fg"><label>셀 너비</label>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="range" id="cw" min="14" max="60" value="26" oninput="onCW(this.value)">
        <span class="sv" id="cwv">26px</span>
      </div>
    </div>
    <div class="fg"><label>행 높이</label>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="range" id="rh" min="22" max="80" value="36" oninput="onRH(this.value)">
        <span class="sv" id="rhv">36px</span>
      </div>
    </div>
  </div>
</div>

<div class="mbar">
  <span style="font-size:11px;color:#666;font-weight:600">모드:</span>
  <button class="mbtn on" id="m-arrow" onclick="setMode('arrow')">🏹 화살표 그리기</button>
  <button class="mbtn" id="m-move" onclick="setMode('move')">✋ 화살표 이동</button>
  <button class="mbtn" id="m-ref" onclick="setMode('ref')">📍 기준선 지정</button>
  <span class="ref-info" id="ref-lbl"></span>
  <button class="btn" style="height:28px;font-size:11px;margin-left:6px" onclick="clearRef()">기준선 제거</button>
</div>
<div class="hint">
  🏹 <b>그리기</b>: 셀 드래그 → 화살표 생성 &nbsp;|&nbsp;
  ✋ <b>이동</b>: 화살표 드래그로 위치·행 변경 &nbsp;|&nbsp;
  📍 <b>기준선</b>: 날짜 셀 클릭 → 빨간 세로선 &nbsp;|&nbsp;
  더블클릭: 텍스트 수정 &nbsp;|&nbsp; 우클릭: 삭제
</div>

<div class="chart-wrap"><div id="ct"></div></div>
<div><span class="add-row-btn" id="addbtn" style="display:none" onclick="addRow()">+ 행 추가</span></div>

<div id="modal" style="display:none">
  <div class="modal-bg"><div class="modal">
    <h3 id="mt">텍스트 입력</h3>
    <textarea id="mi" placeholder="화살표 안에 들어갈 내용"></textarea>
    <div class="mhint">Enter = 줄바꿈 &nbsp;|&nbsp; Ctrl+Enter = 확인 &nbsp;|&nbsp; ESC = 취소</div>
    <div class="mbtns">
      <button class="btn" onclick="closeModal(0)">취소</button>
      <button class="btn btn-go" onclick="closeModal(1)">확인</button>
    </div>
  </div></div>
</div>

<script>
// ── 색상 ──
const C={hdrMonth:'#bfbfbf',hdrDay:'#d9d9d9',weHdr:'#bfbfbf',label:'#d9d9d9',cell:'#ffffff',weCell:'#d9d9d9',bd:'#999999',red:'#cc0000',arwF:'#FFD600'};

// ── 상태 ──
let allDays=[],rows=[],arrows=[];
let refDayIdx=-1,mode='arrow';
let CW=26,RH=36,built=false;
let dDrag=null,dRow=null,hCells=[];
let mDrag=null,pModal=null;

function onCW(v){CW=+v;document.getElementById('cwv').textContent=v+'px';if(built)applySize();}
function onRH(v){RH=+v;document.getElementById('rhv').textContent=v+'px';if(built)applySize();}
function applySize(){
  const tbl=document.getElementById('gt');if(!tbl)return;
  tbl.querySelectorAll('th.day-th').forEach(th=>{th.style.width=CW+'px';th.style.minWidth=CW+'px';});
  tbl.querySelectorAll('td.cell').forEach(td=>{td.style.width=CW+'px';td.style.minWidth=CW+'px';td.style.height=RH+'px';});
  tbl.querySelectorAll('tr.data-row').forEach(tr=>{tr.style.height=RH+'px';tr.querySelectorAll('td').forEach(td=>td.style.height=RH+'px');});
  drawAll();
}

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isWE(d){return d.getDay()===0||d.getDay()===6;}
function setMode(m){mode=m;['arrow','move','ref'].forEach(k=>document.getElementById('m-'+k).classList.toggle('on',k===m));}
function clearRef(){refDayIdx=-1;document.getElementById('ref-lbl').textContent='';renderTable();}

function monthGroups(){
  const g=[];
  allDays.forEach((day,di)=>{
    const k=day.getFullYear()+'-'+day.getMonth();
    if(!g.length||g[g.length-1].key!==k) g.push({key:k,month:day.getMonth()+1,count:1});
    else g[g.length-1].count++;
  });
  return g;
}

function buildChart(){
  CW=+document.getElementById('cw').value;RH=+document.getElementById('rh').value;
  const s=document.getElementById('cs').value,e=document.getElementById('ce').value;
  if(!s||!e)return;
  allDays=[];let d=pd(s);const end=pd(e);
  while(d<=end){allDays.push(new Date(d));d=ad(d,1);}
  if(!rows.length)rows=[{label:'ER2'},{label:'자검1차'},{label:'자검2차'},{label:'DV1'},{label:'DV2'}];
  arrows=[];refDayIdx=-1;document.getElementById('ref-lbl').textContent='';
  renderTable();built=true;
}

function renderTable(){
  const mg=monthGroups();
  const LW=80,MH=28,DH=22;
  const BD=`1px solid ${C.bd}`;
  const th=(e)=>`border:${BD};padding:0;text-align:center;vertical-align:middle;color:#000;${e||''}`;
  const td=(e)=>`border:${BD};padding:0;text-align:center;vertical-align:middle;${e||''}`;
  let h=`<table id="gt" style="border-collapse:collapse;table-layout:fixed;position:relative;background:#fff;border:${BD}">`;
  h+=`<colgroup><col style="width:${LW}px">`;
  allDays.forEach(()=>h+=`<col style="width:${CW}px">`);
  h+=`</colgroup><thead>`;
  h+=`<tr style="height:${MH}px">`;
  h+=`<th rowspan="2" style="${th(`width:${LW}px;min-width:${LW}px;height:${MH}px;background:${C.hdrMonth};font-size:11px;font-weight:700;cursor:pointer`)}" onclick="editRowLabel(-1)">구분</th>`;
  mg.forEach(m=>h+=`<th colspan="${m.count}" style="${th(`height:${MH}px;background:${C.hdrMonth};font-size:12px;font-weight:700`)}">${m.month}월</th>`);
  h+=`</tr><tr style="height:${DH}px">`;
  allDays.forEach((day,di)=>{
    const bg=isWE(day)?C.weHdr:C.hdrDay;
    const rl=di===refDayIdx?`border-left:2px solid ${C.red};`:'';
    h+=`<th class="day-th" data-di="${di}" style="${th(`${rl}width:${CW}px;min-width:${CW}px;height:${DH}px;background:${bg};font-size:10px;font-weight:700`)}">${String(day.getDate()).padStart(2,'0')}</th>`;
  });
  h+=`</tr></thead><tbody>`;
  rows.forEach((row,ri)=>{
    h+=`<tr class="data-row" data-ri="${ri}" style="height:${RH}px">`;
    h+=`<td onclick="editRowLabel(${ri})" style="${td(`width:${LW}px;min-width:${LW}px;height:${RH}px;background:${C.label};font-size:11px;font-weight:700;color:#000;cursor:pointer;padding:2px 5px;white-space:pre-line;line-height:1.4`)}">${row.label.replace(/\n/g,'<br>')}</td>`;
    allDays.forEach((day,di)=>{
      const bg=isWE(day)?C.weCell:C.cell;
      const rl=di===refDayIdx?`border-left:2px solid ${C.red};`:'';
      h+=`<td class="cell${isWE(day)?' we':''}" data-ri="${ri}" data-di="${di}" id="cc${ri}_${di}" style="${td(`${rl}width:${CW}px;min-width:${CW}px;height:${RH}px;background:${bg};cursor:crosshair`)}"></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  document.getElementById('ct').innerHTML=h;
  document.getElementById('addbtn').style.display='inline-block';
  const tbl=document.getElementById('gt');
  tbl.addEventListener('mousedown',onDown);tbl.addEventListener('mousemove',onMove);
  tbl.addEventListener('mouseup',onUp);tbl.addEventListener('dragstart',e=>e.preventDefault());
  drawAll();
}

function cRect(ri,di){
  const el=document.getElementById(`cc${ri}_${di}`);if(!el)return null;
  const tbl=document.getElementById('gt');
  const tr=tbl.getBoundingClientRect(),cr=el.getBoundingClientRect();
  return{x:cr.left-tr.left,y:cr.top-tr.top,w:cr.width,h:cr.height};
}
function arwPath(w,h){
  const tip=Math.min(h*0.75,w*0.2,22);
  const y1=h*0.18,y2=h*0.82,bx=w-tip;
  return{p:`M0,${y1} L${bx},${y1} L${bx},0 L${w},${h/2} L${bx},${h} L${bx},${y2} L0,${y2} Z`,bw:bx};
}
function fitFS(lines,maxW,maxH){
  const cv=document.createElement('canvas'),ctx=cv.getContext('2d');
  for(let fs=13;fs>=7;fs--){
    ctx.font=`700 ${fs}px 'Malgun Gothic',sans-serif`;
    const lh=fs*1.3,th=lines.length*lh,mw=Math.max(...lines.map(l=>ctx.measureText(l).width));
    if(mw<=maxW-6&&th<=maxH-4)return fs;
  }
  return 7;
}
function drawAll(){
  document.querySelectorAll('.asvg,.ref-svg').forEach(e=>e.remove());
  arrows.forEach((a,ai)=>drawArrow(a,ai));
  drawRefLine();
}
function drawArrow(a,ai){
  const tbl=document.getElementById('gt');if(!tbl)return;
  const s=cRect(a.ri,a.di0),e=cRect(a.ri,a.di1);if(!s||!e)return;
  const PAD=2,x=s.x,y=s.y+PAD,w=(e.x+e.w)-s.x,h=s.h-PAD*2;
  if(w<4||h<4)return;
  const{p,bw}=arwPath(w,h);
  const lines=(a.label||'').split('\n');
  const fs=fitFS(lines,bw,h);
  const lh=fs*1.3,th=lines.length*lh;
  const moving=mDrag&&mDrag.ai===ai;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','asvg');svg.setAttribute('data-ai',ai);
  svg.setAttribute('width',w);svg.setAttribute('height',h);
  svg.style.cssText=`position:absolute;left:${x}px;top:${y}px;overflow:visible;pointer-events:all;z-index:${moving?20:5};cursor:${mode==='move'?'grab':'pointer'};opacity:${moving?0.5:1}`;
  const defs=document.createElementNS(ns,'defs');
  const cl=document.createElementNS(ns,'clipPath');cl.setAttribute('id',`cl${ai}`);
  const cr=document.createElementNS(ns,'rect');
  cr.setAttribute('x','1');cr.setAttribute('y','0');cr.setAttribute('width',Math.max(0,bw-2));cr.setAttribute('height',h);
  cl.appendChild(cr);defs.appendChild(cl);
  const pg=document.createElementNS(ns,'path');
  pg.setAttribute('d',p);pg.setAttribute('fill',C.arwF);pg.setAttribute('stroke',C.arwF);pg.setAttribute('stroke-width','0.5');
  svg.appendChild(defs);svg.appendChild(pg);
  lines.forEach((line,li)=>{
    const txt=document.createElementNS(ns,'text');
    txt.setAttribute('x',bw/2);txt.setAttribute('y',(h-th)/2+li*lh+lh*0.82);
    txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size',fs);
    txt.setAttribute('fill','#000');txt.setAttribute('font-weight','700');
    txt.setAttribute('font-family',"'Malgun Gothic','Apple SD Gothic Neo',sans-serif");
    txt.setAttribute('clip-path',`url(#cl${ai})`);txt.textContent=line;
    svg.appendChild(txt);
  });
  svg.addEventListener('mousedown',ev=>{if(mode!=='move')return;ev.stopPropagation();ev.preventDefault();const td=hitCell(ev.clientX,ev.clientY);if(!td)return;mDrag={ai,ori:a.ri,od0:a.di0,od1:a.di1,gdi:+td.dataset.di};});
  svg.addEventListener('dblclick',ev=>{ev.stopPropagation();editArrow(ai);});
  svg.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();arrows.splice(ai,1);drawAll();});
  tbl.appendChild(svg);
}
function drawRefLine(){
  if(refDayIdx<0||!allDays.length)return;
  const tbl=document.getElementById('gt');if(!tbl)return;
  const refCell=document.getElementById(`cc0_${refDayIdx}`);if(!refCell)return;
  const tblR=tbl.getBoundingClientRect(),cellR=refCell.getBoundingClientRect();
  const x=cellR.left-tblR.left,totalH=tbl.offsetHeight;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','ref-svg');svg.setAttribute('width',4);svg.setAttribute('height',totalH);
  svg.style.cssText=`position:absolute;left:${x-1}px;top:0;pointer-events:none;z-index:50;overflow:visible`;
  const line=document.createElementNS(ns,'line');
  line.setAttribute('x1',1);line.setAttribute('y1',0);line.setAttribute('x2',1);line.setAttribute('y2',totalH);
  line.setAttribute('stroke',C.red);line.setAttribute('stroke-width','2');
  const tri=document.createElementNS(ns,'polygon');
  tri.setAttribute('points','-5,0 7,0 1,10');tri.setAttribute('fill',C.red);
  svg.appendChild(line);svg.appendChild(tri);tbl.appendChild(svg);
}
function ghost(ri,di0,di1){
  document.getElementById('gsvg')?.remove();
  const s=cRect(ri,di0),e=cRect(ri,di1);if(!s||!e)return;
  const PAD=2,x=s.x,y=s.y+PAD,w=(e.x+e.w)-s.x,h=s.h-PAD*2;
  const{p}=arwPath(w,h);
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.id='gsvg';svg.setAttribute('width',w);svg.setAttribute('height',h);
  svg.style.cssText=`position:absolute;left:${x}px;top:${y}px;overflow:visible;pointer-events:none;z-index:15;opacity:0.4`;
  const pg=document.createElementNS(ns,'path');
  pg.setAttribute('d',p);pg.setAttribute('fill',C.arwF);pg.setAttribute('stroke',C.arwF);pg.setAttribute('stroke-width','0.5');
  svg.appendChild(pg);document.getElementById('gt').appendChild(svg);
}
function hitCell(cx,cy){
  const tbl=document.getElementById('gt');if(!tbl)return null;
  for(const td of tbl.querySelectorAll('td.cell')){const r=td.getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return td;}
  return null;
}
function clrHov(){hCells.forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('sel');});hCells=[];}
function onDown(ev){
  const td=ev.target.closest('td.cell');if(!td)return;ev.preventDefault();
  if(mode==='ref'){refDayIdx=+td.dataset.di;const day=allDays[refDayIdx];document.getElementById('ref-lbl').textContent=`기준선: ${day.getMonth()+1}월 ${day.getDate()}일`;renderTable();return;}
  if(mode==='arrow'){dDrag={ri:+td.dataset.ri,di:+td.dataset.di};dRow=+td.dataset.ri;td.classList.add('sel');hCells=[`cc${td.dataset.ri}_${td.dataset.di}`];}
}
function onMove(ev){
  if(mode==='arrow'&&dDrag){const td=ev.target.closest('td.cell');if(!td||+td.dataset.ri!==dRow)return;clrHov();const di0=Math.min(dDrag.di,+td.dataset.di),di1=Math.max(dDrag.di,+td.dataset.di);for(let i=di0;i<=di1;i++){const el=document.getElementById(`cc${dRow}_${i}`);if(el){el.classList.add('sel');hCells.push(`cc${dRow}_${i}`);}}}
  if(mode==='move'&&mDrag)mvMove(ev);
}
function onUp(ev){
  if(mode==='arrow'&&dDrag){const td=ev.target.closest('td.cell');let di1=dDrag.di;if(td&&+td.dataset.ri===dRow)di1=+td.dataset.di;clrHov();const di0=Math.min(dDrag.di,di1),di2=Math.max(dDrag.di,di1);dDrag=null;showModal('화살표 텍스트 입력','',(lbl)=>{arrows.push({ri:dRow,di0,di1:di2,label:lbl||''});drawAll();});return;}
  if(mode==='move'&&mDrag)mvUp();
}
function mvMove(ev){const td=hitCell(ev.clientX,ev.clientY);if(!td)return;const curDi=+td.dataset.di,curRi=+td.dataset.ri,span=mDrag.od1-mDrag.od0,off=curDi-mDrag.gdi;let nd0=Math.max(0,Math.min(allDays.length-1,mDrag.od0+off)),nd1=Math.max(0,Math.min(allDays.length-1,nd0+span)),nr=Math.max(0,Math.min(rows.length-1,curRi));ghost(nr,nd0,nd1);mDrag._r=nr;mDrag._d0=nd0;mDrag._d1=nd1;}
function mvUp(){document.getElementById('gsvg')?.remove();if(mDrag._r!=null){arrows[mDrag.ai].ri=mDrag._r;arrows[mDrag.ai].di0=mDrag._d0;arrows[mDrag.ai].di1=mDrag._d1;}mDrag=null;drawAll();}
window.addEventListener('mouseup',()=>{if(mode==='move'&&mDrag)mvUp();if(mode==='arrow'&&dDrag){clrHov();dDrag=null;}});
window.addEventListener('mousemove',ev=>{if(mode==='move'&&mDrag)mvMove(ev);});
function editArrow(ai){showModal('텍스트 수정',arrows[ai].label||'',(v)=>{arrows[ai].label=v;drawAll();});}
function editRowLabel(ri){if(ri<0)return;showModal('행 이름 수정',rows[ri].label,(v)=>{if(v!==null&&v!==undefined){rows[ri].label=v;renderTable();}});}
function addRow(){rows.push({label:'새 항목'});renderTable();}
function undoLast(){if(!arrows.length)return;arrows.pop();drawAll();}
function showModal(title,def,cb){pModal=cb;document.getElementById('mt').textContent=title;const inp=document.getElementById('mi');inp.value=def||'';document.getElementById('modal').style.display='block';setTimeout(()=>{inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);},50);inp.onkeydown=e=>{if(e.key==='Enter'&&e.ctrlKey)closeModal(1);if(e.key==='Escape')closeModal(0);};}
function closeModal(ok){document.getElementById('modal').style.display='none';if(ok&&pModal)pModal(document.getElementById('mi').value);pModal=null;}

// ════════════════════════════════════════════════════
//  PPT 내보내기 — 순수 JS ZIP (STORED, 깨짐 없음)
//  python-pptx로 생성한 베이스 파일들 + 동적 slide1.xml
// ════════════════════════════════════════════════════

// Base64 → Uint8Array
function b64ToU8(b64){
  const bin=atob(b64);
  const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
  return u8;
}

// UTF-8 문자열 → Uint8Array
function strToU8(str){return new TextEncoder().encode(str);}

// 32비트 리틀엔디안 쓰기
function u32le(n){return new Uint8Array([n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff]);}
function u16le(n){return new Uint8Array([n&0xff,(n>>8)&0xff]);}

// CRC32
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[i]=c;}return t;})();
function crc32(buf){let c=0xFFFFFFFF;for(let i=0;i<buf.length;i++)c=CRC_TABLE[(c^buf[i])&0xff]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}

// ZIP STORED 방식으로 파일 추가
function buildZip(files){
  // files: [{name:string, data:Uint8Array}]
  const localHeaders=[];
  const centralDirs=[];
  let offset=0;
  const parts=[];

  for(const f of files){
    const nameBytes=strToU8(f.name);
    const data=f.data;
    const crc=crc32(data);
    const size=data.length;

    // Local file header
    const lh=new Uint8Array(30+nameBytes.length);
    const lhView=new DataView(lh.buffer);
    lhView.setUint32(0,0x04034b50,true); // signature
    lhView.setUint16(4,20,true);          // version needed
    lhView.setUint16(6,0,true);           // flags
    lhView.setUint16(8,0,true);           // compression: STORED
    lhView.setUint16(10,0,true);          // mod time
    lhView.setUint16(12,0,true);          // mod date
    lhView.setUint32(14,crc,true);        // crc32
    lhView.setUint32(18,size,true);       // compressed size
    lhView.setUint32(22,size,true);       // uncompressed size
    lhView.setUint16(26,nameBytes.length,true); // name length
    lhView.setUint16(28,0,true);          // extra length
    lh.set(nameBytes,30);

    // Central directory entry
    const cd=new Uint8Array(46+nameBytes.length);
    const cdView=new DataView(cd.buffer);
    cdView.setUint32(0,0x02014b50,true);  // signature
    cdView.setUint16(4,20,true);           // version made by
    cdView.setUint16(6,20,true);           // version needed
    cdView.setUint16(8,0,true);            // flags
    cdView.setUint16(10,0,true);           // compression: STORED
    cdView.setUint16(12,0,true);           // mod time
    cdView.setUint16(14,0,true);           // mod date
    cdView.setUint32(16,crc,true);         // crc32
    cdView.setUint32(20,size,true);        // compressed size
    cdView.setUint32(24,size,true);        // uncompressed size
    cdView.setUint16(28,nameBytes.length,true); // name length
    cdView.setUint16(30,0,true);           // extra length
    cdView.setUint16(32,0,true);           // comment length
    cdView.setUint16(34,0,true);           // disk start
    cdView.setUint16(36,0,true);           // internal attrs
    cdView.setUint32(38,0,true);           // external attrs
    cdView.setUint32(42,offset,true);      // local header offset
    cd.set(nameBytes,46);
    centralDirs.push(cd);

    parts.push(lh);
    parts.push(data);
    offset+=lh.length+size;
  }

  // End of central directory
  const cdStart=offset;
  let cdSize=0;
  for(const cd of centralDirs)cdSize+=cd.length;

  const eocd=new Uint8Array(22);
  const eocdView=new DataView(eocd.buffer);
  eocdView.setUint32(0,0x06054b50,true);      // signature
  eocdView.setUint16(4,0,true);                // disk number
  eocdView.setUint16(6,0,true);                // disk with central dir
  eocdView.setUint16(8,files.length,true);     // entries on disk
  eocdView.setUint16(10,files.length,true);    // total entries
  eocdView.setUint32(12,cdSize,true);          // central dir size
  eocdView.setUint32(16,cdStart,true);         // central dir offset
  eocdView.setUint16(20,0,true);               // comment length

  // Assemble
  for(const cd of centralDirs)parts.push(cd);
  parts.push(eocd);

  const total=parts.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);
  let pos=0;
  for(const p of parts){out.set(p,pos);pos+=p.length;}
  return out;
}

// PPT XML 생성
function hx(s){return s.replace('#','').toUpperCase();}
const EMU=9144;
function epx(v){return Math.round(v*EMU);}

function buildSlide1Xml(){
  const LW=80,MH=28,DH=22;
  const BD=6350;
  const mg=monthGroups();
  const nDays=allDays.length;
  const TW=epx(LW)+nDays*epx(CW);
  const TH=epx(MH)+epx(DH)+rows.length*epx(RH);
  const SW=12192000,SH=6858000;
  const TX=epx(10),TY=Math.round((SH-TH)/2);

  function bdr(refLeft){
    const lw=refLeft?19050:BD, lc=refLeft?hx(C.red):hx(C.bd);
    return `<a:lnL w="${lw}"><a:solidFill><a:srgbClr val="${lc}"/></a:solidFill></a:lnL>`+
      `<a:lnR w="${BD}"><a:solidFill><a:srgbClr val="${hx(C.bd)}"/></a:solidFill></a:lnR>`+
      `<a:lnT w="${BD}"><a:solidFill><a:srgbClr val="${hx(C.bd)}"/></a:solidFill></a:lnT>`+
      `<a:lnB w="${BD}"><a:solidFill><a:srgbClr val="${hx(C.bd)}"/></a:solidFill></a:lnB>`;
  }
  function tc(txt,bg,bold,fs,cs,rs,rl,vm){
    const sa=cs>1?` gridSpan="${cs}"`:''
    const ra=rs>1?` rowSpan="${rs}"`:''
    const va=vm?' vMerge="1"':''
    const safe=(txt||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,' ');
    const body=txt?`<a:p><a:pPr algn="ctr"/><a:r><a:rPr lang="ko-KR" sz="${Math.round((fs||9)*100)}"${bold?' b="1"':''}><a:solidFill><a:srgbClr val="000000"/></a:solidFill></a:rPr><a:t>${safe}</a:t></a:r></a:p>`:`<a:p><a:endParaRPr lang="ko-KR" sz="${Math.round((fs||9)*100)}"/></a:p>`;
    return `<a:tc${va}><a:txBody><a:bodyPr anchor="ctr"/><a:lstStyle/>${body}</a:txBody><a:tcPr${sa}${ra}>${bdr(rl)}<a:solidFill><a:srgbClr val="${hx(bg)}"/></a:solidFill></a:tcPr></a:tc>`;
  }

  const colXml=[epx(LW),...allDays.map(()=>epx(CW))].map(w=>`<a:gridCol w="${w}"/>`).join('');

  let tblRows='';
  // 행0: 월헤더 (구분 rowspan=2)
  tblRows+=`<a:tr h="${epx(MH)}">`;
  tblRows+=tc('구분',C.hdrMonth,true,10,1,2,false,false);
  mg.forEach(m=>tblRows+=tc(`${m.month}월`,C.hdrMonth,true,11,m.count,1,false,false));
  tblRows+=`</a:tr>`;
  // 행1: 일자 (vMerge)
  tblRows+=`<a:tr h="${epx(DH)}">`;
  tblRows+=tc('',C.hdrMonth,false,8,1,1,false,true);
  allDays.forEach((day,di)=>{
    const bg=isWE(day)?C.weHdr:C.hdrDay;
    tblRows+=tc(String(day.getDate()).padStart(2,'0'),bg,true,8,1,1,di===refDayIdx,false);
  });
  tblRows+=`</a:tr>`;
  // 데이터행
  rows.forEach((row,ri)=>{
    tblRows+=`<a:tr h="${epx(RH)}">`;
    tblRows+=tc(row.label,C.label,true,9,1,1,false,false);
    allDays.forEach((day,di)=>{
      const bg=isWE(day)?C.weCell:C.cell;
      tblRows+=tc('',bg,false,8,1,1,di===refDayIdx,false);
    });
    tblRows+=`</a:tr>`;
  });

  const tblXml=`<a:tbl xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:tblPr bandRow="0"/><a:tblGrid>${colXml}</a:tblGrid>${tblRows}</a:tbl>`;

  // 화살표
  const hdrH=epx(MH)+epx(DH);
  let shapes='';
  arrows.forEach((a,ai)=>{
    const ax=TX+epx(LW)+a.di0*epx(CW);
    const aw=(a.di1-a.di0+1)*epx(CW);
    const ay=TY+hdrH+a.ri*epx(RH)+epx(2);
    const ah=epx(RH-4);
    const t=(a.label||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,' ');
    shapes+=`<p:sp xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:nvSpPr><p:cNvPr id="${200+ai}" name="A${ai}"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="${ax}" y="${ay}"/><a:ext cx="${aw}" cy="${ah}"/></a:xfrm><a:prstGeom prst="homePlate"><a:avLst><a:gd name="adj" fmla="val 50000"/></a:avLst></a:prstGeom><a:solidFill><a:srgbClr val="${hx(C.arwF)}"/></a:solidFill><a:ln w="0"><a:noFill/></a:ln></p:spPr><p:txBody><a:bodyPr anchor="ctr"/><a:lstStyle/><a:p><a:pPr algn="ctr"/><a:r><a:rPr lang="ko-KR" sz="900" b="1" dirty="0"><a:solidFill><a:srgbClr val="000000"/></a:solidFill></a:rPr><a:t>${t}</a:t></a:r></a:p></p:txBody></p:sp>`;
  });

  // 기준선
  if(refDayIdx>=0){
    const lx=TX+epx(LW)+refDayIdx*epx(CW);
    shapes+=`<p:sp xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:nvSpPr><p:cNvPr id="300" name="Ref"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="${lx}" y="${TY}"/><a:ext cx="19050" cy="${TH}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom><a:solidFill><a:srgbClr val="${hx(C.red)}"/></a:solidFill><a:ln><a:noFill/></a:ln></p:spPr><p:txBody><a:bodyPr/><a:lstStyle/><a:p/></p:txBody></p:sp>`;
  }

  return `<?xml version='1.0' encoding='UTF-8' standalone='yes'?>`+
    `<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">`+
    `<p:cSld><p:spTree>`+
    `<p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>`+
    `<p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>`+
    `<p:graphicFrame>`+
    `<p:nvGraphicFramePr><p:cNvPr id="100" name="GanttTable"/><p:cNvGraphicFramePr><a:graphicFrameLocks noGrp="1"/></p:cNvGraphicFramePr><p:nvPr/></p:nvGraphicFramePr>`+
    `<p:xfrm><a:off x="${TX}" y="${TY}"/><a:ext cx="${TW}" cy="${TH}"/></p:xfrm>`+
    `<a:graphic><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/table">${tblXml}</a:graphicData></a:graphic>`+
    `</p:graphicFrame>`+
    shapes+
    `</p:spTree></p:cSld>`+
    `<p:clrMapOvr><a:masterClrMapping/></p:clrMapOvr>`+
    `</p:sld>`;
}
